<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 - VRC Translator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="settings-app">

    <div class="settings-scroll">

      <!-- スクリーンショットフォルダ -->
      <section class="section">
        <h2>スクリーンショットフォルダ</h2>
        <div class="model-row">
          <input type="text" id="watch-dir" class="input" placeholder="C:\Users\…\Pictures\VRChat">
          <button class="btn btn-secondary btn-sm" id="browse-dir-btn">参照…</button>
        </div>
      </section>

      <!-- 通知 -->
      <section class="section">
        <h2>通知</h2>
        <label class="field-inline">
          <input type="checkbox" id="sound-enabled">
          <span>翻訳完了時に通知音を鳴らす</span>
        </label>
      </section>

      <!-- OSC 設定 -->
      <section class="section">
        <h2>OSC 設定</h2>
        <div class="row-fields">
          <label class="field">
            <span>ホスト</span>
            <input type="text" id="osc-host" class="input" placeholder="127.0.0.1">
          </label>
          <label class="field field-sm">
            <span>ポート</span>
            <input type="number" id="osc-port" class="input" placeholder="9000" min="1" max="65535">
          </label>
        </div>
        <label class="field">
          <span>アドレス</span>
          <input type="text" id="osc-address" class="input" placeholder="/chatbox/input">
        </label>
        <label class="field-inline">
          <input type="checkbox" id="osc-prefix-enabled">
          <span>送信テキストの先頭に [翻訳結果] を付ける</span>
        </label>
        <div class="btn-group">
          <button class="btn btn-secondary btn-sm" id="test-osc-btn">OSC テスト送信</button>
        </div>
      </section>

      <!-- プロバイダー / API キー / モデル -->
      <section class="section">
        <h2>プロバイダー設定</h2>

        <select id="provider" class="input">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI (GPT)</option>
          <option value="groq">Groq (LLaMA)</option>
          <option value="custom">カスタム (OpenAI 互換)</option>
        </select>

        <!-- カスタムプロバイダー設定（custom 選択時のみ表示） -->
        <div id="custom-section" class="section-group" style="display:none">
          <p class="section-group-title">カスタムプロバイダー設定</p>
          <label class="field">
            <span>表示名</span>
            <input type="text" id="custom-display-name" class="input" placeholder="Local LLM">
          </label>
          <label class="field">
            <span>チャット補完 URL</span>
            <input type="text" id="custom-api-url" class="input" placeholder="http://localhost:1234/v1/chat/completions">
          </label>
          <label class="field">
            <span>API キー（任意）</span>
            <input type="password" id="custom-api-key" class="input" placeholder="不要な場合は空欄">
          </label>
          <label class="field">
            <span>モデル一覧取得 URL（任意）</span>
            <input type="text" id="custom-models-url" class="input" placeholder="http://localhost:1234/v1/models">
          </label>
        </div>

        <!-- API キー（標準プロバイダー用） -->
        <div id="api-keys-section" class="section-group">
          <p class="section-group-title">API キー</p>
          <label class="field" id="key-anthropic-row">
            <span>Anthropic</span>
            <input type="password" id="key-anthropic" class="input" placeholder="sk-ant-…">
          </label>
          <label class="field" id="key-openai-row" style="display:none">
            <span>OpenAI</span>
            <input type="password" id="key-openai" class="input" placeholder="sk-…">
          </label>
          <label class="field" id="key-groq-row" style="display:none">
            <span>Groq</span>
            <input type="password" id="key-groq" class="input" placeholder="gsk_…">
          </label>
        </div>

        <!-- モデル -->
        <div class="section-group">
          <p class="section-group-title">モデル</p>
          <div class="model-row">
            <input
              type="text"
              id="model-input"
              class="input"
              list="model-list"
              placeholder="空欄 = プロバイダのデフォルト"
            >
            <datalist id="model-list"></datalist>
            <button class="btn btn-secondary btn-sm" id="fetch-models-btn">取得</button>
          </div>
          <p class="field-hint" id="model-hint"></p>
        </div>

      </section>

      <!-- 翻訳プロンプト -->
      <section class="section">
        <h2>翻訳プロンプト</h2>
        <textarea id="prompt" class="input textarea" rows="4"></textarea>
      </section>

    </div><!-- .settings-scroll -->

    <!-- フッター（固定） -->
    <footer class="settings-footer">
      <p class="save-status hidden" id="save-status"></p>
      <button class="btn btn-primary" id="save-btn">設定を保存</button>
    </footer>

  </div><!-- .settings-app -->

  <script type="module" src="settings.js"></script>
</body>
</html>
