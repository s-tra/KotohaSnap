<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vrc-translator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- ヘッダー -->
    <header class="header">
      <div class="app-title-group">
        <h1 class="app-title">vrc-translator</h1>
        <button class="btn-about" id="about-btn" title="アプリケーション情報">ⓘ</button>
      </div>
      <div class="header-controls">
        <div class="toggle-group">
          <span class="toggle-group-label">翻訳</span>
          <span class="toggle-label" id="toggle-label">OFF</span>
          <button class="toggle-btn" id="toggle-btn" aria-pressed="false" title="翻訳 ON/OFF">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </button>
        </div>
        <div class="toggle-group">
          <span class="toggle-group-label">チャット送信</span>
          <span class="toggle-label" id="osc-toggle-label">OFF</span>
          <button class="toggle-btn" id="osc-toggle-btn" aria-pressed="false" title="OSC 送信 ON/OFF">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </button>
        </div>
        <button class="btn btn-secondary btn-sm" id="settings-btn">設定</button>
      </div>
    </header>

    <!-- ログパネル -->
    <section class="log-panel">
      <div class="log-header">
        <div class="log-header-left">
          <div class="font-size-group">
            <span class="font-size-label">文字サイズ</span>
            <button class="btn-font" id="font-decrease-btn" title="フォントサイズを小さく">−</button>
            <span class="font-size-value" id="font-size-value">13</span>
            <button class="btn-font" id="font-increase-btn" title="フォントサイズを大きく">＋</button>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" id="clear-btn">クリア</button>
      </div>

      <div class="log-list" id="log-list">
      </div>

      <div class="osc-status hidden" id="osc-status"></div>
      <div class="error-bar hidden" id="error-bar">
        <span class="error-bar-msg" id="error-bar-msg"></span>
        <button class="error-bar-close" id="error-bar-close" aria-label="閉じる">×</button>
      </div>
    </section>

  </div><!-- .app -->

  <script type="module" src="main.js"></script>
</body>
</html>
