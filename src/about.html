<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vrc-translatorについて</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="about-app">
    <div class="about-icon">🍰🍴</div>
    <h1 class="about-title">vrc-translator</h1>
    <p class="about-version" id="about-version">v0.0.0</p>
    <p class="about-license">MIT License — Copyright (c) 2025 s-tra</p>

    <!-- リンクエリア：href を編集してください -->
    <div class="about-links">
      <button class="about-link-btn" data-url="https://github.com/s-tra/vrc-translator">
        <span class="about-link-icon">⌥</span> GitHub
      </button>
      <button class="about-link-btn" data-url="https://x.com/_s_tra">
        <span class="about-link-icon">✕</span> X (Twitter)
      </button>
    </div>
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;

    const version = await invoke('get_version');
    document.getElementById('about-version').textContent = `v${version}`;

    document.querySelectorAll('.about-link-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        invoke('open_url', { url: btn.dataset.url });
      });
    });
  </script>
</body>
</html>
